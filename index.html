<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Powerful Search</title>
    <link rel="icon" id="faviconLink" href="data:," />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #07080f;
        --surface: rgba(255, 255, 255, 0.06);
        --surface-hover: rgba(255, 255, 255, 0.1);
        --border: rgba(255, 255, 255, 0.1);
        --border-focus: rgba(120, 180, 255, 0.5);
        --text-primary: #f0f2ff;
        --text-secondary: rgba(200, 210, 240, 0.55);
        --accent: #5b8cff;
        --accent2: #a78bfa;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        background: var(--bg);
        color: var(--text-primary);
        font-family: "DM Sans", sans-serif;
        overflow-x: hidden;
      }

      /* ---- BACKGROUND ---- */
      #bgImage {
        position: fixed;
        inset: 0;
        z-index: 0;
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        transition: filter 0.4s ease, opacity 0.5s ease, transform 0.4s ease;
        opacity: 0;
      }
      #bgImage.loaded {
        opacity: 1;
      }
      .bg-overlay {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background: rgba(4, 6, 18, 0.52);
        transition: background 0.3s;
      }
      .bg-gradient {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background:
          radial-gradient(ellipse 80% 60% at 20% 10%, rgba(40, 60, 160, 0.2) 0%, transparent 70%),
          radial-gradient(ellipse 60% 50% at 80% 80%, rgba(100, 40, 160, 0.16) 0%, transparent 65%);
      }
      .stars {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        overflow: hidden;
        transition: opacity 0.5s;
      }
      .star {
        position: absolute;
        border-radius: 50%;
        background: #fff;
        animation: twinkle var(--d, 3s) ease-in-out infinite;
        animation-delay: var(--delay, 0s);
        opacity: 0;
      }
      @keyframes twinkle {
        0%, 100% { opacity: 0; transform: scale(0.5); }
        50%       { opacity: var(--op, 0.7); transform: scale(1); }
      }

      /* ---- BG CONTROLS ---- */
      .bg-controls {
        position: fixed;
        bottom: 1.4rem;
        right: 1.4rem;
        z-index: 10;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 0.55rem;
      }
      .bg-panel {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(8, 10, 24, 0.5);
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        display: flex;
        flex-direction: column;
        padding: 1.5rem;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s;
        z-index: 100;
      }
      .bg-panel.open { opacity: 1; pointer-events: all; }
      .bg-panel-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1rem;
      }
      .bg-panel-title { font-size: 1.1rem; color: var(--text-primary); }
      .bg-panel-close {
        width: 36px; height: 36px;
        border-radius: 10px;
        background: rgba(255,255,255,0.1);
        border: none;
        color: var(--text-secondary);
        font-size: 1.2rem;
        cursor: pointer;
        transition: all 0.2s;
      }
      .bg-panel-close:hover { background: rgba(255,255,255,0.2); color: var(--text-primary); }
      .upload-btn {
        width: 100%;
        padding: 0.52rem 0.85rem;
        border-radius: 10px;
        background: rgba(91, 140, 255, 0.13);
        border: 1.5px dashed rgba(91, 140, 255, 0.38);
        color: #a8c4ff;
        font-size: 0.78rem;
        font-family: "DM Sans", sans-serif;
        cursor: pointer;
        text-align: center;
        transition: all 0.2s;
        display: block;
      }
      .upload-btn:hover { background: rgba(91, 140, 255, 0.22); border-color: rgba(91, 140, 255, 0.6); }
      .bg-sliders {
        background: rgba(8, 10, 24, 0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 0.8rem 1rem;
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
        min-width: 180px;
      }
      .slider-row { display: flex; align-items: center; justify-content: space-between; gap: 0.6rem; }
      .slider-label { font-size: 0.72rem; color: var(--text-secondary); white-space: nowrap; }
      .delete-current-btn {
        width: 100%;
        padding: 0.4rem 0.8rem;
        border-radius: 9px;
        background: rgba(255, 91, 106, 0.1);
        border: 1px solid rgba(255, 91, 106, 0.25);
        color: rgba(255, 150, 158, 0.8);
        font-size: 0.72rem;
        font-family: "DM Sans", sans-serif;
        cursor: pointer;
        transition: all 0.2s;
        margin-top: 0.5rem;
      }
      .delete-current-btn:hover { background: rgba(255, 91, 106, 0.22); }
      .bg-image-list {
        max-height: calc(100vh - 260px);
        overflow-y: auto;
        display: flex;
        gap: 12px;
        padding: 10px 0;
        align-items: flex-start;
      }
      .masonry-col {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 12px;
        min-width: 0;
      }
      .bg-image-list::-webkit-scrollbar { width: 6px; }
      .bg-image-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }
      .bg-image-item {
        position: relative;
        border-radius: 12px;
        overflow: hidden;
        cursor: pointer;
        border: 3px solid transparent;
        transition: border-color 0.2s, box-shadow 0.2s;
      }
      .bg-image-item:hover { border-color: rgba(91,140,255,0.5); box-shadow: 0 0 12px rgba(91,140,255,0.3); }
      .bg-image-item.active { border-color: var(--accent); box-shadow: 0 0 15px rgba(91,140,255,0.5); }
      .bg-image-item.editing { cursor: default; }
      .bg-image-item img {
        width: 100%;
        height: auto;
        display: block;
        transition: opacity 0.45s ease;
        opacity: 1;
      }
      .bg-image-item .crop-overlay {
        position: absolute; top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0,0,0,0.4);
        pointer-events: none; opacity: 0;
        transition: opacity 0.2s;
      }
      .bg-image-item:hover .crop-overlay, .bg-image-item.editing .crop-overlay { opacity: 1; }
      .bg-crop-box {
        position: absolute;
        border: 2px solid #5b8cff;
        background: rgba(91, 140, 255, 0.15);
        cursor: move;
        box-shadow: 0 0 0 9999px rgba(0,0,0,0.5);
        pointer-events: auto;
      }
      .bg-crop-instructions {
        position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
        background: rgba(0,0,0,0.7); color: #fff; font-size: 0.65rem;
        padding: 3px 8px; border-radius: 4px; white-space: nowrap;
        pointer-events: none; opacity: 0; transition: opacity 0.2s;
        z-index: 10;
      }
      .bg-image-item:hover .bg-crop-instructions, .bg-image-item.editing .bg-crop-instructions { opacity: 1; }
      .bg-no-images { text-align: center; color: var(--text-secondary); font-size: 0.85rem; padding: 2rem 0; }

      /* Custom Confirm Modal */
      .custom-modal-overlay {
        position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0,0,0,0.7);
        backdrop-filter: blur(4px);
        display: flex; align-items: center; justify-content: center;
        z-index: 1000;
        opacity: 0; visibility: hidden;
        transition: opacity 0.2s, visibility 0.2s;
      }
      .custom-modal-overlay.show { opacity: 1; visibility: visible; }
      .custom-modal {
        background: rgba(15, 18, 40, 0.95);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(91, 140, 255, 0.3);
        border-radius: 16px;
        padding: 1.5rem;
        min-width: 320px;
        max-width: 90vw;
        transform: scale(0.9) translateY(-10px);
        transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .custom-modal-overlay.show .custom-modal { transform: scale(1) translateY(0); }
      .custom-modal-title { font-size: 1rem; font-weight: 600; color: var(--text-primary); margin-bottom: 0.75rem; }
      .custom-modal-message { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 1.25rem; line-height: 1.5; }
      .custom-modal-actions { display: flex; gap: 0.75rem; justify-content: flex-end; }
      .custom-modal-btn {
        padding: 0.5rem 1.25rem;
        border-radius: 8px;
        font-size: 0.85rem;
        font-family: "DM Sans", sans-serif;
        cursor: pointer;
        transition: all 0.2s;
        border: none;
      }
      .custom-modal-btn.cancel { background: rgba(255,255,255,0.1); color: var(--text-secondary); }
      .custom-modal-btn.cancel:hover { background: rgba(255,255,255,0.18); color: var(--text-primary); }
      .custom-modal-btn.confirm { background: rgba(255,91,106,0.2); color: #ff6b7a; border: 1px solid rgba(255,91,106,0.4); }
      .custom-modal-btn.confirm:hover { background: rgba(255,91,106,0.3); }
      .custom-modal-btn.alert { background: rgba(91,140,255,0.2); color: #8ab4ff; border: 1px solid rgba(91,140,255,0.4); }
      .custom-modal-btn.alert:hover { background: rgba(91,140,255,0.3); }

      .blur-slider {
        -webkit-appearance: none;
        width: 95px; height: 4px;
        border-radius: 2px;
        background: rgba(255,255,255,0.12);
        outline: none;
        cursor: pointer;
      }
      .blur-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 14px; height: 14px;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 6px rgba(91,140,255,0.5);
        cursor: pointer;
      }
      .button-group { display: flex; gap: 8px; }
      .bg-toggle-btn {
        width: 38px; height: 38px;
        border-radius: 11px;
        background: rgba(8, 10, 24, 0.75);
        backdrop-filter: blur(12px);
        border: 1px solid var(--border);
        color: var(--text-secondary);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
        font-size: 1.05rem;
      }
      .bg-toggle-btn:hover { color: var(--text-primary); border-color: rgba(255,255,255,0.2); }

      /* ---- LAYOUT ---- */
      .page {
        position: relative; z-index: 1;
        min-height: 100vh;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        padding: 2rem 1.5rem 5rem;
      }

      /* ---- SEARCH ---- */
      .search-container {
        width: 100%; max-width: 660px;
        animation: fadeUp 0.9s cubic-bezier(0.16, 1, 0.3, 1) both;
      }
      .search-engine-tabs {
        display: flex; gap: 0.5rem;
        margin-bottom: 0.75rem;
        justify-content: center;
      }
      .engine-tab {
        padding: 0.3rem 0.9rem;
        border-radius: 99px;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text-secondary);
        font-size: 0.78rem;
        font-family: "DM Sans", sans-serif;
        cursor: pointer;
        transition: all 0.2s;
        backdrop-filter: blur(8px);
      }
      .engine-tab:hover { color: var(--text-primary); border-color: rgba(255,255,255,0.18); }
      .engine-tab.active { background: rgba(91,140,255,0.18); border-color: var(--border-focus); color: #a8c4ff; }
      .search-wrap { position: relative; display: flex; align-items: center; }
      .search-icon {
        position: absolute; left: 1.2rem;
        color: var(--text-secondary);
        width: 18px; height: 18px;
        pointer-events: none; flex-shrink: 0;
      }
      .search-input {
        width: 100%;
        padding: 1.05rem 4.5rem 1.05rem 3.2rem;
        background: rgba(255,255,255,0.07);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid var(--border);
        border-radius: 18px;
        color: var(--text-primary);
        font-size: 1rem;
        font-family: "DM Sans", sans-serif;
        outline: none;
        transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
      }
      .search-input::placeholder { color: var(--text-secondary); }
      .search-input:focus {
        border-color: var(--border-focus);
        background: rgba(255,255,255,0.09);
        box-shadow: 0 0 0 3px rgba(91,140,255,0.13), 0 8px 40px rgba(0,0,0,0.4);
      }
      .search-btn {
        position: absolute; right: 0.6rem;
        width: 2.4rem; height: 2.4rem;
        border-radius: 11px;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        border: none; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        transition: transform 0.18s, box-shadow 0.18s;
        box-shadow: 0 2px 14px rgba(91,140,255,0.4);
      }
      .search-btn:hover { transform: scale(1.07); box-shadow: 0 4px 22px rgba(91,140,255,0.55); }
      .search-btn:active { transform: scale(0.96); }
      .search-btn svg { color: #fff; width: 15px; height: 15px; }

      /* ---- LINKS SECTION ---- */
      .links-section {
        width: 100%; max-width: 900px;
        margin-top: 2.5rem;
        animation: fadeUp 0.9s 0.18s cubic-bezier(0.16, 1, 0.3, 1) both;
      }
      .links-toggle {
        display: flex; align-items: center; gap: 0.6rem;
        cursor: pointer;
        width: fit-content; margin: 0 auto;
        padding: 0.55rem 1.1rem;
        border-radius: 99px;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text-secondary);
        font-size: 0.82rem;
        font-family: "DM Sans", sans-serif;
        transition: all 0.22s;
        backdrop-filter: blur(12px);
        user-select: none;
      }
      .links-toggle:hover { color: var(--text-primary); border-color: rgba(255,255,255,0.18); background: var(--surface-hover); }
      .links-toggle .toggle-icon { width: 14px; height: 14px; transition: transform 0.35s cubic-bezier(0.16,1,0.3,1); flex-shrink: 0; }
      .links-toggle.open .toggle-icon { transform: rotate(180deg); }
      .links-toggle .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); opacity: 0.7; }
      .links-grid-wrap {
        overflow: hidden; max-height: 0;
        transition: max-height 0.6s cubic-bezier(0.16,1,0.3,1), opacity 0.35s ease, margin 0.35s ease;
        opacity: 0; margin-top: 0;
      }
      .links-grid-wrap.open { max-height: 2000px; opacity: 1; margin-top: 1.4rem; }
      .links-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
      .links-title { font-family: "Syne", sans-serif; font-size: 0.75rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-secondary); }
      .add-btn {
        display: flex; align-items: center; gap: 0.4rem;
        padding: 0.38rem 0.85rem;
        border-radius: 99px;
        background: rgba(91,140,255,0.14);
        border: 1px solid rgba(91,140,255,0.3);
        color: #a8c4ff;
        font-size: 0.78rem;
        font-family: "DM Sans", sans-serif;
        cursor: pointer;
        transition: all 0.2s;
      }
      .add-btn:hover { background: rgba(91,140,255,0.24); border-color: rgba(91,140,255,0.5); }
      .add-btn svg { width: 12px; height: 12px; }
      .links-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 0.8rem; }

      /* ---- LINK CARD ---- */
      .link-card {
        position: relative;
        background: var(--surface);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 1rem 0.85rem 0.85rem;
        cursor: pointer;
        transition: transform 0.22s cubic-bezier(0.16,1,0.3,1), background 0.2s, border-color 0.2s, box-shadow 0.2s;
        display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
        animation: cardIn 0.4s cubic-bezier(0.16,1,0.3,1) both;
        user-select: none;
      }
      @keyframes cardIn {
        from { opacity: 0; transform: scale(0.88) translateY(8px); }
        to   { opacity: 1; transform: scale(1) translateY(0); }
      }
      .link-card:hover {
        transform: translateY(-3px) scale(1.03);
        background: var(--surface-hover);
        border-color: rgba(255,255,255,0.15);
        box-shadow: 0 8px 30px rgba(0,0,0,0.35), 0 0 0 1px rgba(91,140,255,0.1);
      }
      .link-card:active { transform: scale(0.97); }
      .card-actions { position: absolute; top: 0.45rem; right: 0.45rem; display: flex; gap: 0.3rem; opacity: 0; transition: opacity 0.18s; }
      .link-card:hover .card-actions { opacity: 1; }
      .card-action-btn {
        width: 22px; height: 22px;
        border-radius: 6px;
        display: flex; align-items: center; justify-content: center;
        border: none; cursor: pointer;
        transition: background 0.15s;
        font-size: 0.65rem;
      }
      .card-action-btn.edit { background: rgba(91,140,255,0.25); color: #a8c4ff; }
      .card-action-btn.edit:hover { background: rgba(91,140,255,0.45); }
      .card-action-btn.del  { background: rgba(255,91,106,0.2); color: #ff8f9a; }
      .card-action-btn.del:hover { background: rgba(255,91,106,0.4); }
      .card-favicon {
        width: 36px; height: 36px;
        border-radius: 10px;
        background: rgba(255,255,255,0.07);
        display: flex; align-items: center; justify-content: center;
        font-size: 1.1rem; overflow: hidden;
        border: 1px solid var(--border); flex-shrink: 0;
      }
      .card-favicon img { width: 100%; height: 100%; object-fit: cover; }
      .card-name { font-size: 0.78rem; font-weight: 500; color: var(--text-primary); text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
      .card-url  { font-size: 0.62rem; color: var(--text-secondary); text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
      .card-cat  { font-size: 0.58rem; padding: 0.12rem 0.42rem; border-radius: 99px; background: rgba(91,140,255,0.13); color: rgba(168,196,255,0.7); border: 1px solid rgba(91,140,255,0.2); white-space: nowrap; }
      .link-card.add-placeholder {
        border-style: dashed; border-color: rgba(255,255,255,0.1);
        color: var(--text-secondary); background: transparent;
        justify-content: center; min-height: 98px; gap: 0.35rem;
      }
      .link-card.add-placeholder:hover { border-color: rgba(91,140,255,0.35); color: #8ab4ff; background: rgba(91,140,255,0.05); box-shadow: none; transform: translateY(-2px); }
      .add-placeholder-icon { font-size: 1.25rem; opacity: 0.45; }
      .add-placeholder-text { font-size: 0.72rem; }

      /* ---- MODAL ---- */
      .modal-overlay {
        position: fixed; inset: 0; z-index: 100;
        background: rgba(0,0,0,0.65);
        backdrop-filter: blur(8px);
        display: flex; align-items: center; justify-content: center;
        opacity: 0; pointer-events: none;
        transition: opacity 0.25s;
      }
      .modal-overlay.open { opacity: 1; pointer-events: all; }
      .modal {
        background: #0c0e1e;
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 22px;
        padding: 1.8rem;
        width: 100%; max-width: 440px;
        box-shadow: 0 30px 80px rgba(0,0,0,0.7);
        transform: scale(0.92) translateY(12px);
        transition: transform 0.3s cubic-bezier(0.16,1,0.3,1);
        max-height: 90vh; overflow-y: auto;
      }
      .modal-overlay.open .modal { transform: scale(1) translateY(0); }
      .modal-title { font-family: "Syne", sans-serif; font-size: 1.05rem; font-weight: 700; color: var(--text-primary); margin-bottom: 1.3rem; }
      .modal-field { margin-bottom: 0.9rem; }
      .modal-label { display: block; font-size: 0.72rem; font-weight: 500; color: var(--text-secondary); margin-bottom: 0.38rem; letter-spacing: 0.05em; text-transform: uppercase; }
      .modal-input {
        width: 100%; padding: 0.6rem 0.9rem;
        background: rgba(255,255,255,0.06);
        border: 1px solid var(--border);
        border-radius: 10px;
        color: var(--text-primary);
        font-size: 0.9rem; font-family: "DM Sans", sans-serif;
        outline: none;
        transition: border-color 0.2s, box-shadow 0.2s;
      }
      .modal-input:focus { border-color: var(--border-focus); box-shadow: 0 0 0 3px rgba(91,140,255,0.1); }
      .modal-input::placeholder { color: rgba(200,210,240,0.25); }

      /* emoji picker */
      .emoji-cats { display: flex; gap: 0.35rem; flex-wrap: wrap; margin-bottom: 0.65rem; }
      .emoji-cat-btn {
        padding: 0.2rem 0.58rem;
        border-radius: 99px;
        background: var(--surface);
        border: 1px solid var(--border);
        color: var(--text-secondary);
        font-size: 0.68rem; font-family: "DM Sans", sans-serif;
        cursor: pointer; transition: all 0.15s;
      }
      .emoji-cat-btn.active, .emoji-cat-btn:hover { background: rgba(91,140,255,0.18); border-color: rgba(91,140,255,0.42); color: #a8c4ff; }
      .emoji-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 0.35rem; max-height: 150px; overflow-y: auto; padding-right: 2px; }
      .emoji-grid::-webkit-scrollbar { width: 4px; }
      .emoji-grid::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
      .emoji-btn {

    <script>
      // ---- STARS ----
      (function () {
        const c = document.getElementById("stars");
        for (let i = 0; i < 100; i++) {
          const s = document.createElement("div");
          s.className = "star";
          const sz = Math.random() * 2 + 0.5;
          s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${2+Math.random()*4}s;--delay:${Math.random()*5}s;--op:${0.3+Math.random()*0.6}`;
          c.appendChild(s);
        }
      })();

      // ---- BACKGROUND IMAGE ----
      const bgEl        = document.getElementById("bgImage");
      const bgOverlayEl = document.getElementById("bgOverlay");
      const starsEl     = document.getElementById("stars");
      const blurSlider  = document.getElementById("blurSlider");
      const dimSlider   = document.getElementById("dimSlider");
      const bgPanel     = document.getElementById("bgPanel");
      const bgToggle    = document.getElementById("bgToggleBtn");

      let bgBlur = 18, bgDim = 52, selectedBgFilename = '', currentBgFilename = '';
      let bgPositionX = 50, bgPositionY = 50;
      let activeCropBoxSync = null;

      function applyBg() {
        bgEl.style.filter = `blur(${bgBlur}px)`;
        bgEl.style.transform = `scale(${1 + bgBlur * 0.004})`;
        bgEl.style.backgroundPosition = `${bgPositionX}% ${bgPositionY}%`;
        bgOverlayEl.style.background = `rgba(4,6,18,${bgDim / 100})`;
      }

      function loadImageElement(src) {
        return new Promise((resolve, reject) => {
          const img = new Image();
          img.onload = () => resolve(img);
          img.onerror = reject;
          img.src = src;
        });
      }

      async function setBackgroundImage(url, filename = currentBgFilename) {
        try {
          // 先预加载
          await loadImageElement(url);
          
          bgEl.style.backgroundImage = `url(${url})`;
          bgEl.classList.add("loaded");
          starsEl.style.opacity = "0.3";
          currentBgFilename = filename || '';
        } catch (error) {
          console.error('Failed to preload background image:', error);
          // 降级处理：直接设置
          bgEl.style.backgroundImage = `url(${url})`;
          bgEl.classList.add("loaded");
        }
      }

      async function loadSavedBg() {
        try {
          const res = await fetch('/api/background');
          if (res.ok) {
            const bg = await res.json();
            if (bg.blur != null) { bgBlur = bg.blur; blurSlider.value = bgBlur; }
            if (bg.dim  != null) { bgDim  = bg.dim;  dimSlider.value  = bgDim;  }
            if (bg.positionX != null) { bgPositionX = bg.positionX; }
            if (bg.positionY != null) { bgPositionY = bg.positionY; }
            if (bg.filename) {
              await setBackgroundImage(bg.url || `/uploads/${bg.filename}`, bg.filename);
            }
          }
        } catch (error) {
          console.error('Failed to load background:', error);
        }
        applyBg();
      }

      document.getElementById("bgFileInput").addEventListener("change", async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const formData = new FormData();
        formData.append('image', file);
        try {
          const res = await fetch('/api/upload', { method: 'POST', body: formData });
          if (res.ok) {
            const data = await res.json();
            await setBackgroundImage(data.url, data.filename);
            await fetch('/api/background', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ filename: data.filename, blur: bgBlur, dim: bgDim, positionX: bgPositionX, positionY: bgPositionY })
            });
            applyBg();
            loadBgImageList();
          } else {
            const errText = await res.text();
            console.error('Upload failed:', errText);
            await showAlert('上传失败：' + errText, { title: '错误', confirmText: '好的' });
          }
        } catch (error) {
          console.error('Upload error:', error);
          await showAlert('上传出错：' + error.message, { title: '错误', confirmText: '好的' });
        }
        // Reset input so same file can be re-selected
        e.target.value = '';
      });

      let bgSaveTimeout;
      async function saveBgSettings() {
        clearTimeout(bgSaveTimeout);
        bgSaveTimeout = setTimeout(async () => {
          try {
            await fetch('/api/background', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ filename: currentBgFilename, blur: bgBlur, dim: bgDim, positionX: bgPositionX, positionY: bgPositionY })
            });
          } catch (error) {
            console.error('Save error:', error);
          }
        }, 500);
      }

      blurSlider.addEventListener("input", () => { bgBlur = +blurSlider.value; applyBg(); saveBgSettings(); });
      dimSlider.addEventListener("input",  () => { bgDim  = +dimSlider.value;  applyBg(); saveBgSettings(); });

      // ---- Custom Modal ----
      function showCustomModal(message, options = {}) {
        return new Promise((resolve) => {
          const {
            title = '提示',
            confirmText = '确认',
            cancelText = '取消',
            type = 'confirm',
            confirmClass = 'confirm'
          } = options;

          const overlay = document.createElement('div');
          overlay.className = 'custom-modal-overlay';
          const buttons = type === 'alert'
            ? `<button class="custom-modal-btn alert">${confirmText}</button>`
            : `<button class="custom-modal-btn cancel">${cancelText}</button>
               <button class="custom-modal-btn ${confirmClass}">${confirmText}</button>`;

          overlay.innerHTML = `
            <div class="custom-modal">
              <div class="custom-modal-title">${title}</div>
              <div class="custom-modal-message">${message}</div>
              <div class="custom-modal-actions">${buttons}</div>
            </div>`;
          document.body.appendChild(overlay);
          requestAnimationFrame(() => overlay.classList.add('show'));

          const handleAction = (result) => {
            overlay.classList.remove('show');
            setTimeout(() => { overlay.remove(); resolve(result); }, 200);
          };
          const btns = overlay.querySelectorAll('.custom-modal-btn');
          if (type === 'alert') {
            btns[0].addEventListener('click', () => handleAction(true));
          } else {
            btns[0].addEventListener('click', () => handleAction(false));
            btns[1].addEventListener('click', () => handleAction(true));
          }
          overlay.addEventListener('click', (e) => { if (e.target === overlay && type !== 'alert') handleAction(false); });
          const handleEsc = (e) => {
            if (e.key === 'Escape') {
              handleAction(type === 'alert');
              document.removeEventListener('keydown', handleEsc);
            }
          };
          document.addEventListener('keydown', handleEsc);
        });
      }
      function showAlert(message, options = {}) { return showCustomModal(message, { ...options, type: 'alert' }); }
      function showConfirm(message, options = {}) { return showCustomModal(message, { ...options, type: 'confirm' }); }

      // ---- BG Image List ----
      // ---- BG Image List - 渐进式加载（Thumb → Display）----
async function loadBgImageList() {
  const container = document.getElementById('bgImageList');
  try {
    const res = await fetch('/api/images');
    const images = await res.json();

    if (images.length === 0) {
      container.innerHTML = '<div class="bg-no-images">暂无上传的图片</div>';
      selectedBgFilename = '';
      return;
    }

    selectedBgFilename = currentBgFilename;

    const cols = [[], [], []];
    images.forEach((img, i) => cols[i % 3].push(img));

    // 生成 HTML（关键修改部分）
    container.innerHTML = cols.map(col => `
      <div class="masonry-col">
        ${col.map(img => `
          <div class="bg-image-item ${img.filename === currentBgFilename ? 'active' : ''}"
               data-filename="${img.filename}" 
               data-display-url="${img.url || img.displayUrl || img.originalUrl}">
            <img 
              src="${img.thumbUrl || img.url}" 
              data-display-src="${img.url || img.displayUrl || img.originalUrl}"
              alt="" 
              loading="lazy" 
              decoding="async" 
            />
          </div>`).join('')}
      </div>`).join('');

        // === 核心：为每张图片实现 Thumb → Display 渐进加载 ===
        container.querySelectorAll('.bg-image-item img').forEach(img => {
          const thumbSrc = img.src;
          const displaySrc = img.dataset.displaySrc;

          // 如果 thumb 和 display 是同一张图，就不需要升级
          if (!displaySrc || displaySrc === thumbSrc) return;

          const preloadImg = new Image();

          preloadImg.onload = () => {
            // 开始切换
            img.classList.add('loading');

            // 等待一点时间让浏览器准备好新图片
            setTimeout(() => {
              img.src = displaySrc;

              // 加载完成后恢复清晰
              img.onload = () => {
                img.classList.remove('loading');
              };
            }, 120);
          };

          // 开始预加载高清 display 图（不阻塞当前显示）
          preloadImg.src = displaySrc;
        });

        // 为当前选中的图片初始化裁剪框
        container.querySelectorAll('.bg-image-item.active').forEach((item) => {
          setTimeout(() => {
            const img = item.querySelector('img');
            if (img.complete) {
              initCropBox(item, img, true);
            } else {
              img.onload = () => initCropBox(item, img, true);
            }
          }, 100);
        });

        // 点击切换背景
        container.querySelectorAll('.bg-image-item').forEach((item) => {
          item.addEventListener('click', async (e) => {
            // 如果点击的是裁剪框，不切换背景
            if (e.target.closest('.bg-crop-box')) return;

            const filename = item.dataset.filename;
            const displayUrl = item.querySelector('img').dataset.displaySrc;

            // 移除所有旧的裁剪框
            container.querySelectorAll('.crop-overlay, .bg-crop-box, .bg-crop-instructions').forEach(el => el.remove());

            // 移除其他 active 状态
            container.querySelectorAll('.bg-image-item').forEach(i => i.classList.remove('active'));
            item.classList.add('active');

            selectedBgFilename = filename;

            // 使用 display 图作为背景（更清晰）
            await setBackgroundImage(displayUrl, filename);

            // 重置位置为居中
            bgPositionX = 50;
            bgPositionY = 50;

            // 重新为当前图片初始化裁剪框
            const img = item.querySelector('img');
            initCropBox(item, img, true);

            // 保存设置
            await fetch('/api/background', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ filename, blur: bgBlur, dim: bgDim, positionX: bgPositionX, positionY: bgPositionY })
            });
            applyBg();
          });
        });

      } catch (error) {
        console.error('Failed to load image list:', error);
        container.innerHTML = '<div class="bg-no-images">加载图片列表失败</div>';
      }
    }

    function initCropBox(item, img, isActive) {
      if (!isActive) return;

      const overlay = document.createElement('div');
      overlay.className = 'crop-overlay';
      item.appendChild(overlay);

      const instructions = document.createElement('div');
      instructions.className = 'bg-crop-instructions';
      instructions.textContent = '拖动框选区域来调整背景显示位置，框的大小就是实际可见范围';
      item.appendChild(instructions);

      const box = document.createElement('div');
      box.className = 'bg-crop-box';
      item.appendChild(box);

      function getCoverViewportRect() {
        const rect = img.getBoundingClientRect();
        const viewAspect = window.innerWidth / window.innerHeight;
        const imgAspect = rect.width / rect.height;

        if (viewAspect > imgAspect) {
          return { rect, width: rect.width, height: rect.width / viewAspect };
        }
        return { rect, width: rect.height * viewAspect, height: rect.height };
      }

      function clampBackgroundPosition() {
        bgPositionX = Math.max(0, Math.min(100, bgPositionX));
        bgPositionY = Math.max(0, Math.min(100, bgPositionY));
      }

      function syncBoxToPosition() {
        const { rect, width, height } = getCoverViewportRect();
        const overflowX = Math.max(0, rect.width - width);
        const overflowY = Math.max(0, rect.height - height);
        clampBackgroundPosition();

        const left = overflowX === 0 ? 0 : (bgPositionX / 100) * overflowX;
        const top = overflowY === 0 ? 0 : (bgPositionY / 100) * overflowY;

        box.style.width = width + 'px';
        box.style.height = height + 'px';
        box.style.left = left + 'px';
        box.style.top = top + 'px';
      }

      activeCropBoxSync = () => {
        if (!item.isConnected || !img.isConnected) {
          if (activeCropBoxSync) activeCropBoxSync = null;
          return;
        }
        syncBoxToPosition();
      };

      function syncPosition() {
        const { rect, width, height } = getCoverViewportRect();
        const left = parseFloat(box.style.left) || 0;
        const top = parseFloat(box.style.top) || 0;
        const overflowX = Math.max(0, rect.width - width);
        const overflowY = Math.max(0, rect.height - height);

        bgPositionX = overflowX === 0 ? 50 : (left / overflowX) * 100;
        bgPositionY = overflowY === 0 ? 50 : (top / overflowY) * 100;
        clampBackgroundPosition();
        applyBg();
      }

      syncBoxToPosition();

      let isDragging = false;
      let startX = 0;
      let startY = 0;
      let startL = 0;
      let startT = 0;

      box.addEventListener('mousedown', (e) => {
        e.preventDefault();
        e.stopPropagation();
        isDragging = true;
        startX = e.clientX;
        startY = e.clientY;
        startL = box.offsetLeft;
        startT = box.offsetTop;
        item.classList.add('editing');
      });

      document.addEventListener('mousemove', (e) => {
        if (!isDragging) return;

        const { rect } = getCoverViewportRect();
        const dx = e.clientX - startX;
        const dy = e.clientY - startY;
        let nextLeft = startL + dx;
        let nextTop = startT + dy;

        nextLeft = Math.max(0, Math.min(nextLeft, rect.width - box.offsetWidth));
        nextTop = Math.max(0, Math.min(nextTop, rect.height - box.offsetHeight));

        box.style.left = nextLeft + 'px';
        box.style.top = nextTop + 'px';
        syncPosition();
      });

      document.addEventListener('mouseup', async () => {
        if (!isDragging) return;
        isDragging = false;
        item.classList.remove('editing');
        await saveBgSettings();
      });
    }

    window.addEventListener('resize', () => {
      if (typeof activeCropBoxSync === 'function') {
        activeCropBoxSync();
      }
    });

    document.getElementById("deleteCurrentBgBtn").addEventListener("click", async () => {
        if (!selectedBgFilename) {
          await showAlert('请先选择一张图片', { title: '提示', confirmText: '好的' });
          return;
        }
        const confirmed = await showConfirm('确认要删除选中的图片吗？', {
          title: '删除确认', confirmText: '删除', cancelText: '取消'
        });
        if (!confirmed) return;
        try {
          const res = await fetch(`/api/upload/${selectedBgFilename}`, { method: 'DELETE' });
          if (res.ok) {
            if (selectedBgFilename === currentBgFilename) {
              bgEl.style.backgroundImage = "";
              bgEl.classList.remove("loaded");
              starsEl.style.opacity = "1";
              currentBgFilename = '';
            }
            selectedBgFilename = '';
            loadBgImageList();
          }
        } catch (error) {
          console.error('Failed to delete image:', error);
        }
      });

      bgToggle.addEventListener("click", (e) => {
        e.stopPropagation();
        bgPanel.classList.add("open");
        loadBgImageList();
      });
      document.getElementById("bgPanelClose").addEventListener("click", () => bgPanel.classList.remove("open"));
      bgPanel.addEventListener("click", (e) => { if (e.target === bgPanel) bgPanel.classList.remove("open"); });

      document.getElementById("randomFaviconBtn").addEventListener("click", () => {
        const all = allEmojis();
        const picked = all[Math.floor(Math.random() * all.length)];
        let link = document.querySelector("link[rel~='icon']");
        if (!link) { link = document.createElement("link"); link.rel = "icon"; document.head.appendChild(link); }
        const canvas = document.createElement("canvas");
        canvas.width = 32; canvas.height = 32;
        const ctx = canvas.getContext("2d");
        ctx.font = "28px serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText(picked, 16, 16);
        link.href = canvas.toDataURL();
        document.querySelectorAll(".tab-emoji").forEach(el => {
          el.style.transform = "scale(0)"; el.style.opacity = "0";
          setTimeout(() => {
            el.textContent = all[Math.floor(Math.random() * all.length)];
            el.style.transform = "scale(1)"; el.style.opacity = "1";
          }, 100);
        });
      });

      loadSavedBg();

      // Set default favicon
      (function setDefaultFavicon() {
        const canvas = document.createElement("canvas");
        canvas.width = 32; canvas.height = 32;
        const ctx = canvas.getContext("2d");
        ctx.font = "28px serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText("🔍", 16, 16);
        document.getElementById("faviconLink").href = canvas.toDataURL();
      })();

      // ---- SEARCH ----
      let engine = "google";
      const engines = {
        google: (q) => `https://www.google.com/search?q=${encodeURIComponent(q)}`,
        bing:   (q) => `https://www.bing.com/search?q=${encodeURIComponent(q)}`,
      };
      document.querySelectorAll(".engine-tab").forEach((btn) => {
        btn.addEventListener("click", () => {
          document.querySelectorAll(".engine-tab").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          engine = btn.dataset.engine;
        });
      });
      function doSearch() {
        const q = document.getElementById("searchInput").value.trim();
        if (!q) return;
        window.open(engines[engine](q), "_blank");
      }
      document.getElementById("searchBtn").addEventListener("click", doSearch);
      document.getElementById("searchInput").addEventListener("keydown", (e) => { if (e.key === "Enter") doSearch(); });

      // ---- LINKS ----
      const DEFAULTS = [
        { id: 1, name: "GitHub",    url: "https://github.com",          icon: "💻", cat: "开发" },
        { id: 2, name: "YouTube",   url: "https://youtube.com",         icon: "📺", cat: "娱乐" },
        { id: 3, name: "Twitter/X", url: "https://x.com",               icon: "🐦", cat: "社交" },
        { id: 4, name: "Gmail",     url: "https://mail.google.com",     icon: "📧", cat: "邮件" },
        { id: 5, name: "Wikipedia", url: "https://www.wikipedia.org",   icon: "📚", cat: "知识" },
        { id: 6, name: "Figma",     url: "https://figma.com",           icon: "🎨", cat: "设计" },
      ];

      async function loadLinks() {
        try {
          const res = await fetch('/api/links');
          if (res.ok) return await res.json();
        } catch (error) { console.error('Failed to load links:', error); }
        return [...DEFAULTS];
      }
      async function saveLinks() {
        try {
          await fetch('/api/links', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(links)
          });
        } catch (error) { console.error('Failed to save links:', error); }
      }

      let links = [];
      loadLinks().then(loaded => { links = loaded; renderGrid(); });

      function getFavicon(url) {
        try { return `https://www.google.com/s2/favicons?domain=${new URL(url).hostname}&sz=64`; }
        catch { return null; }
      }

      const gridEl = document.getElementById("linksGrid");
      function renderGrid() {
        gridEl.innerHTML = "";
        links.forEach((lk, idx) => {
          const card = document.createElement("div");
          card.className = "link-card";
          card.style.animationDelay = `${idx * 0.04}s`;
          const fav = lk.useEmoji ? null : getFavicon(lk.url);
          const iconHtml = fav
            ? `<img src="${fav}" alt="" onerror="this.parentElement.innerHTML='${lk.icon.replace(/'/g, "&#39;")}';">`
            : lk.icon;
          card.innerHTML = `
            <div class="card-actions">
              <button class="card-action-btn edit" title="编辑">✏️</button>
              <button class="card-action-btn del"  title="删除">🗑️</button>
            </div>
            <div class="card-favicon">${iconHtml}</div>
            <div class="card-name">${lk.name}</div>
            <div class="card-url">${new URL(lk.url).hostname.replace("www.", "")}</div>
            ${lk.cat ? `<span class="card-cat">${lk.cat}</span>` : ""}`;
          card.addEventListener("click", (e) => {
            if (!e.target.closest(".card-action-btn")) window.open(lk.url, "_blank");
          });
          card.querySelector(".edit").addEventListener("click", (e) => { e.stopPropagation(); openModal(lk.id); });
          card.querySelector(".del").addEventListener("click", (e) => {
            e.stopPropagation();
            card.style.animation = "cardOut 0.25s forwards";
            setTimeout(() => { links = links.filter(l => l.id !== lk.id); saveLinks(); renderGrid(); }, 220);
          });
          gridEl.appendChild(card);
        });
        const plus = document.createElement("div");
        plus.className = "link-card add-placeholder";
        plus.innerHTML = `<div class="add-placeholder-icon">➕</div><div class="add-placeholder-text">添加链接</div>`;
        plus.addEventListener("click", () => openModal());
        gridEl.appendChild(plus);
      }

      // Toggle links section
      const wrapEl   = document.getElementById("linksGridWrap");
      const toggleEl = document.getElementById("linksToggle");
      toggleEl.addEventListener("click", () => {
        const o = wrapEl.classList.toggle("open");
        toggleEl.classList.toggle("open", o);
        document.getElementById("toggleLabel").textContent = o ? "隐藏快捷链接" : "显示快捷链接";
      });

      // ---- EMOJI DATA ----
      let EMOJI_CATS = { "全部": null };

      fetch('/api/emojis').then(r => r.json()).then(data => {
        const groupNames = {
          "Smileys & Emotion": "表情",
          "People & Body":     "人物",
          "Animals & Nature":  "动植物",
          "Food & Drink":      "食物饮品",
          "Travel & Places":   "旅行地点",
          "Activities":        "活动",
          "Objects":           "物品",
          "Symbols":           "符号",
          "Flags":             "旗帜"
        };
        EMOJI_CATS = { "全部": null };
        Object.entries(data).forEach(([group, emojis]) => {
          const cn = groupNames[group] || group;
          EMOJI_CATS[cn] = emojis;
        });
      }).catch(() => {
        EMOJI_CATS = {
          "全部": null,
          "表情": ["😀","😃","😄","😁","😆","😅","🤣","😂","🙂","😊","😇","🥰"]
        };
      });

      let activeCat = "全部", selectedEmoji = "💡", useEmoji = false, editId = null;
      const inputName = document.getElementById("inputName");
      const inputUrl  = document.getElementById("inputUrl");
      const inputCat  = document.getElementById("inputCat");
      const overlay   = document.getElementById("modalOverlay");
      const toggleFaviconBtn = document.getElementById("toggleFavicon");
      const toggleEmojiBtn   = document.getElementById("toggleEmoji");
      const emojiSection     = document.getElementById("emojiSection");

      toggleFaviconBtn.addEventListener("click", () => {
        useEmoji = false;
        toggleFaviconBtn.classList.add("active");
        toggleEmojiBtn.classList.remove("active");
        emojiSection.style.display = "none";
        document.getElementById("randomEmojiField").style.display = "none";
      });
      toggleEmojiBtn.addEventListener("click", () => {
        useEmoji = true;
        toggleEmojiBtn.classList.add("active");
        toggleFaviconBtn.classList.remove("active");
        emojiSection.style.display = "";
        document.getElementById("randomEmojiField").style.display = "";
      });

      document.getElementById("randomEmojiBtn").addEventListener("click", () => {
        const all = allEmojis();
        const picked = all[Math.floor(Math.random() * all.length)];
        selectedEmoji = picked;
        document.getElementById("randomEmojiResult").textContent = picked;
        const g = document.getElementById("emojiGrid");
        const existing = g.querySelector(".emoji-btn.selected");
        if (existing) existing.classList.remove("selected");
        const target = Array.from(g.querySelectorAll(".emoji-btn")).find(b => b.textContent === picked);
        if (target) { target.classList.add("selected"); target.scrollIntoView({ block: "nearest" }); }
        else { activeCat = "全部"; buildEmojiUI(); }
      });

      function allEmojis() {
        return [...new Set(
          Object.entries(EMOJI_CATS).filter(([k]) => k !== "全部").flatMap(([, v]) => v)
        )];
      }
      function getEmojis(cat) { return cat === "全部" ? allEmojis() : EMOJI_CATS[cat] || []; }

      function buildEmojiUI() {
        const catsEl = document.getElementById("emojiCats");
        catsEl.innerHTML = "";
        Object.keys(EMOJI_CATS).forEach((cat) => {
          const b = document.createElement("button");
          b.className = "emoji-cat-btn" + (cat === activeCat ? " active" : "");
          b.textContent = cat;
          b.addEventListener("click", () => { activeCat = cat; buildEmojiUI(); });
          catsEl.appendChild(b);
        });
        const g = document.getElementById("emojiGrid");
        g.innerHTML = "";
        getEmojis(activeCat).forEach((em) => {
          const b = document.createElement("button");
          b.className = "emoji-btn" + (em === selectedEmoji ? " selected" : "");
          b.textContent = em; b.title = em;
          b.addEventListener("click", () => {
            selectedEmoji = em;
            g.querySelectorAll(".emoji-btn").forEach(x => x.classList.remove("selected"));
            b.classList.add("selected");
          });
          g.appendChild(b);
        });
      }

      function openModal(id) {
        editId = id || null;
        document.getElementById("modalTitle").textContent = id ? "编辑链接" : "添加链接";
        if (id) {
          const lk = links.find(l => l.id === id);
          inputName.value = lk.name;
          inputUrl.value  = lk.url;
          inputCat.value  = lk.cat || "";
          selectedEmoji   = lk.icon || "💡";
          useEmoji        = !!lk.useEmoji;
        } else {
          inputName.value = inputUrl.value = inputCat.value = "";
          selectedEmoji = "💡"; useEmoji = false;
        }
        if (useEmoji) {
          toggleEmojiBtn.classList.add("active");
          toggleFaviconBtn.classList.remove("active");
          emojiSection.style.display = "";
          document.getElementById("randomEmojiField").style.display = "";
        } else {
          toggleFaviconBtn.classList.add("active");
          toggleEmojiBtn.classList.remove("active");
          emojiSection.style.display = "none";
          document.getElementById("randomEmojiField").style.display = "none";
        }
        document.getElementById("randomEmojiResult").textContent = "";
        activeCat = "全部";
        buildEmojiUI();
        overlay.classList.add("open");
        setTimeout(() => inputName.focus(), 120);
      }
      function closeModal() { overlay.classList.remove("open"); }

      document.getElementById("modalCancel").addEventListener("click", closeModal);
      overlay.addEventListener("click", (e) => { if (e.target === overlay) closeModal(); });
      document.getElementById("modalConfirm").addEventListener("click", () => {
        const name = inputName.value.trim();
        let url = inputUrl.value.trim();
        if (!name || !url) return;
        if (!/^https?:\/\//.test(url)) url = "https://" + url;
        if (editId) {
          const i = links.findIndex(l => l.id === editId);
          links[i] = { ...links[i], name, url, icon: selectedEmoji, useEmoji, cat: inputCat.value.trim() };
        } else {
          links.push({ id: Date.now(), name, url, icon: selectedEmoji, useEmoji, cat: inputCat.value.trim() });
        }
        saveLinks(); renderGrid(); closeModal();
      });

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeModal();
        if (e.key === "/" && document.activeElement.tagName !== "INPUT") {
          e.preventDefault();
          document.getElementById("searchInput").focus();
        }
      });
    </script>
  </body>
</html>
